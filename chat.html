<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FlowGuard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',system-ui,sans-serif;background:#f8f9fb;color:#1e2330;height:100vh;display:flex;flex-direction:column}

    /* Header */
    header{background:#fff;border-bottom:1px solid #e5e7ed;padding:14px 24px;display:flex;align-items:center;gap:12px}
    .logo{width:34px;height:34px;border-radius:8px;background:#2563eb;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:700}
    .brand{font-size:16px;font-weight:700;flex:1}
    .dot{width:8px;height:8px;border-radius:50%;background:#22c55e;margin-right:6px}
    .dot.off{background:#ef4444}
    .status{font-size:12px;color:#6b7280}

    /* Chat */
    .chat{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:14px}
    .chat::-webkit-scrollbar{width:5px}
    .chat::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:8px}

    /* Welcome */
    .welcome{margin:auto;text-align:center;opacity:.7}
    .welcome p{font-size:14px;margin-top:8px;color:#6b7280;max-width:340px}

    /* Message rows */
    .row{display:flex;flex-direction:column;max-width:70%}
    .row.me{align-self:flex-end}
    .row.bot{align-self:flex-start}
    .bubble{padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.55;word-wrap:break-word}
    .row.me .bubble{background:#2563eb;color:#fff;border-bottom-right-radius:4px}
    .row.bot .bubble{background:#fff;border:1px solid #e5e7ed;border-bottom-left-radius:4px}
    .time{font-size:10px;color:#9ca3af;margin-top:3px;padding:0 4px}
    .row.me .time{text-align:right}

    /* Typing dots */
    .dots{display:flex;gap:4px;padding:4px 0}
    .dots span{width:6px;height:6px;border-radius:50%;background:#9ca3af;animation:b 1.2s infinite}
    .dots span:nth-child(2){animation-delay:.2s}
    .dots span:nth-child(3){animation-delay:.4s}
    @keyframes b{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

    /* File attach chip */
    .file-chip{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#fff;border:1px solid #e5e7ed;border-radius:10px;font-size:13px;max-width:280px}
    .file-chip .icon{font-size:20px}
    .file-chip .name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
    .file-chip .size{color:#9ca3af;font-size:11px;flex-shrink:0}

    /* Decision card */
    .card{background:#fff;border:1px solid #e5e7ed;border-radius:12px;overflow:hidden;width:100%;max-width:440px}
    .card-h{padding:10px 14px;border-bottom:1px solid #e5e7ed;display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:600}
    .pill{font-size:11px;font-weight:600;padding:2px 8px;border-radius:100px}
    .pill.ok{background:#f0fdf4;color:#16a34a}
    .pill.warn{background:#fff7ed;color:#ea580c}
    .pill.crit{background:#fef2f2;color:#dc2626}
    .card-b{padding:8px 10px;display:flex;flex-direction:column;gap:6px}
    .item{padding:8px 10px;background:#f8f9fb;border-radius:8px;border-left:3px solid #d1d5db;display:flex;align-items:center;gap:8px}
    .item.CRITICAL{border-left-color:#dc2626}
    .item.HIGH{border-left-color:#ea580c}
    .item.MEDIUM{border-left-color:#d97706}
    .item.LOW{border-left-color:#22c55e}
    .item-info{flex:1;min-width:0}
    .item-name{font-size:13px;font-weight:600}
    .item-meta{font-size:11px;color:#6b7280;margin-top:1px}
    .tag{font-size:10px;font-weight:700;padding:3px 8px;border-radius:100px;flex-shrink:0}
    .tag.PAY{background:#f0fdf4;color:#16a34a}
    .tag.DEFER{background:#fefce8;color:#92400e}
    .tag.NEGOTIATE{background:#eff6ff;color:#2563eb}
    .tag.ESCALATE{background:#fef2f2;color:#dc2626}
    .card-f{padding:8px 14px;border-top:1px solid #e5e7ed;font-size:11px;color:#6b7280;display:flex;justify-content:space-between}
    .card-f .red{color:#dc2626;font-weight:600}
    .card-f .grn{color:#16a34a;font-weight:600}

    /* Error */
    .err{background:#fef2f2;border:1px solid #fca5a5;border-radius:10px;padding:10px 14px;font-size:13px;color:#dc2626;max-width:70%}

    /* Input bar */
    .bar{background:#fff;border-top:1px solid #e5e7ed;padding:10px 20px;display:flex;align-items:flex-end;gap:8px}
    .bar textarea{flex:1;padding:10px 12px;border:1px solid #e5e7ed;border-radius:10px;font-family:inherit;font-size:14px;color:#1e2330;resize:none;outline:none;max-height:100px;line-height:1.4;background:#f8f9fb;transition:border-color .15s}
    .bar textarea:focus{border-color:#2563eb;background:#fff}
    .bar textarea::placeholder{color:#9ca3af}
    .bar button{width:38px;height:38px;border-radius:10px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s}
    .btn-attach{background:#fff;border:1px solid #e5e7ed!important;color:#6b7280;font-size:18px;position:relative}
    .btn-attach:hover{border-color:#2563eb!important;color:#2563eb;background:#eff6ff}
    .btn-send{background:#2563eb;color:#fff}
    .btn-send:disabled{opacity:.35;cursor:default}
    .btn-send:hover:not(:disabled){opacity:.88}
    /* Modal */
    .modal-ov{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(15,23,42,0.6);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
    .modal{background:#fff;width:100%;max-width:480px;border-radius:20px;box-shadow:0 25px 50px -12px rgba(0,0,0,0.25);overflow:hidden;animation:m-in .3s ease-out}
    @keyframes m-in{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .modal-h{padding:24px 32px;background:#f8fafc;border-bottom:1px solid #e2e8f0;text-align:center}
    .modal-h h2{font-size:20px;font-weight:700;color:#0f172a}
    .modal-h p{font-size:14px;color:#64748b;margin-top:4px}
    .modal-b{padding:32px;display:flex;flex-direction:column;gap:18px}
    .f-grp{display:flex;flex-direction:column;gap:6px}
    .f-grp label{font-size:12px;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:0.5px}
    .f-grp input,.f-grp select,.f-grp textarea{padding:12px 16px;border:1px solid #e2e8f0;border-radius:10px;font-family:inherit;font-size:14px;color:#1e293b;transition:all .2s;background:#fff}
    .f-grp input:focus,.f-grp select:focus,.f-grp textarea:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,0.1);outline:none}
    .modal-f{padding:24px 32px;border-top:1px solid #e2e8f0;display:flex;gap:12px;background:#f8fafc}
    .btn-p{flex:1;background:#2563eb;color:#fff;border:none;padding:14px;border-radius:12px;font-weight:600;cursor:pointer;transition:all .2s;font-size:15px}
    .btn-p:hover{background:#1d4ed8;transform:translateY(-1px);box-shadow:0 4px 12px rgba(37,99,235,0.25)}
    .btn-s{background:#f1f5f9;color:#475569;border:none;padding:14px 20px;border-radius:12px;font-weight:600;cursor:pointer}
    .badge-n{display:none;position:absolute;top:-4px;right:-4px;width:16px;height:16px;background:#ef4444;color:#fff;border-radius:50%;font-size:10px;align-items:center;justify-content:center;font-weight:700}

  </style>
</head>
<body>

<header>
  <div class="logo">FG</div>
  <div class="brand">FlowGuard</div>
  <div class="dot off" id="dot"></div>
  <span class="status" id="st">Connecting…</span>
</header>

<div class="chat" id="chat">
  <div class="welcome" id="wel">
    <div style="font-size:40px;margin-bottom:8px">📊</div>
    <b style="font-size:18px">What's your cash situation?</b>
    <p>Type your bills and cash balance in plain English, or attach a file.<br><br><em>Example: "GST 20k Friday, rent 25k Monday, cash 1 lakh"</em></p>
  </div>
</div>

<div class="bar">
  <button class="btn-attach" id="abtn" onclick="document.getElementById('fi').click()" title="Attach PDF, Excel, CSV, or Image">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
    <div class="badge-n" id="bn">1</div>
  </button>
  <input type="file" id="fi" accept=".pdf,.xlsx,.xls,.csv,.png,.jpg,.jpeg,.webp" onchange="onFile(this)"/>
  <textarea id="inp" rows="1" placeholder="Type your obligations and cash…" oninput="rz(this)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();go()}"></textarea>
  <button class="btn-send" id="sb" onclick="go()">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
  </button>
</div>

<!-- Onboarding Modal -->
<div class="modal-ov" id="mOv">
  <div class="modal">
    <div class="modal-h">
      <h2>Welcome to FlowGuard</h2>
      <p>Let's set up your business profile</p>
    </div>
    <div class="modal-b">
      <div class="f-grp">
        <label>Full Name</label>
        <input type="text" id="m_name" placeholder="e.g. Rahul Sharma"/>
      </div>
      <div class="f-grp">
        <label>Business Enterprise</label>
        <input type="text" id="m_biz" placeholder="e.g. Sharma Tech Solutions"/>
      </div>
      <div class="f-grp">
        <label>Industry</label>
        <select id="m_ind">
           <option value="Retail">Retail</option>
           <option value="Manufacturing">Manufacturing</option>
           <option value="Services">Services</option>
           <option value="SaaS">SaaS/Tech</option>
           <option value="Other">Other</option>
        </select>
      </div>
      <div class="f-grp">
        <label>Business Description</label>
        <textarea id="m_desc" rows="2" placeholder="Tell us what your business does..."></textarea>
      </div>
      <div style="display:flex;gap:12px">
        <div class="f-grp" style="flex:1">
          <label>GSTIN (Optional)</label>
          <input type="text" id="m_gst" placeholder="22AAAAA0000A1Z5"/>
        </div>
        <div class="f-grp" style="flex:1">
          <label>Annual Turnover</label>
          <select id="m_turn">
            <option value="<50L">&lt; 50 Lakhs</option>
            <option value="50L-2Cr">50L - 2 Crores</option>
            <option value="2Cr-10Cr">2Cr - 10 Crores</option>
            <option value=">10Cr">&gt; 10 Crores</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-f">
      <button class="btn-p" onclick="saveProfile()">Get Started</button>
    </div>
  </div>
</div>

<script>
// Always point to the FastAPI backend. If served via Live Server or file://, use localhost:8000.
const API = (location.port === '8000') ? location.origin : 'http://localhost:8000';
let busy=false, pFile=null;
const $=id=>document.getElementById(id);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const ts=()=>new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
function rz(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px'}
function scr(){const c=$('chat');c.scrollTop=c.scrollHeight}

// Profile stored in sessionStorage so modal always shows on fresh browser load
let _profile = {};
function checkProfile(){
  const stored = sessionStorage.getItem('fg_profile');
  if(stored){
    try{ _profile = JSON.parse(stored); }catch{}
  }
  if(!_profile.business_name){
    $('mOv').style.display='flex';
  } else {
    $('mOv').style.display='none';
    if($('wel')) $('wel').innerHTML = `<div style="font-size:40px;margin-bottom:8px">🏢</div><b style="font-size:18px">Welcome back, ${esc(_profile.full_name||'User')}</b><p>Managing cash flow for <b>${esc(_profile.business_name)}</b> · ${esc(_profile.industry||'')} · ${esc(_profile.annual_turnover||'')}.<br><br>Type your obligations or attach a file below.</p>`;
  }
}
window.onload = checkProfile;

// Returns a short context string injected into every Groq request
function getProfileContext(){
  if(!_profile.business_name) return '';
  const parts = [
    `Business: ${_profile.business_name}`,
    _profile.industry ? `Industry: ${_profile.industry}` : '',
    _profile.annual_turnover ? `Turnover: ${_profile.annual_turnover}` : '',
    _profile.business_description ? `About: ${_profile.business_description}` : '',
    _profile.gstin ? `GSTIN: ${_profile.gstin}` : '',
  ].filter(Boolean);
  return `[Business Context — ${parts.join(' | ')}]\n`;
}

async function saveProfile(){
  const data = {
    full_name: $('m_name').value.trim(),
    business_name: $('m_biz').value.trim(),
    industry: $('m_ind').value,
    business_description: $('m_desc').value.trim(),
    gstin: $('m_gst').value.trim(),
    annual_turnover: $('m_turn').value
  };
  if(!data.business_name) { alert("Please enter your business name."); return; }
  // Save to sessionStorage immediately (fast, no server wait)
  _profile = data;
  sessionStorage.setItem('fg_profile', JSON.stringify(data));
  // Also persist to server async
  fetch(API+'/profile',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}).catch(()=>{});
  $('mOv').style.display='none';
  $('chat').insertAdjacentHTML('beforeend', `<div class="row bot"><div class="bubble">✅ <b>Profile Saved!</b><br>Welcome, ${esc(data.full_name)}. I'm your personal CFO advisor for <b>${esc(data.business_name)}</b> (${esc(data.industry)}, ${esc(data.annual_turnover)}). Let's manage your cash flow!</div><div class="time">${ts()}</div></div>`);
  if($('wel')) $('wel').remove();
  scr();
}

// Status
async function ping(){
  try{const r=await fetch(API+'/health');const d=await r.json();
    if(d.status==='ok'){$('dot').classList.remove('off');$('st').textContent='Online · v'+d.engine_version;return}}
  catch{}
  $('dot').classList.add('off');$('st').textContent='Offline';
}
ping();setInterval(ping,15000);

// File
function fIcon(n){const e=n.split('.').pop().toLowerCase();
  if(e==='pdf')return'📄';if(['xlsx','xls','csv'].includes(e))return'📊';return'🖼️'}
function onFile(input){
  const f=input.files[0];if(!f)return;
  pFile=f;$('bn').style.display='flex';
  const w=$('wel');if(w)w.remove();
  $('chat').insertAdjacentHTML('beforeend',`<div class="row me"><div class="file-chip"><span class="icon">${fIcon(f.name)}</span><span class="name">${esc(f.name)}</span><span class="size">${(f.size/1024).toFixed(0)} KB</span></div><div class="time">${ts()}</div></div>`);
  scr();input.value='';
}

// Messages
function addMe(t){$('chat').insertAdjacentHTML('beforeend',`<div class="row me"><div class="bubble">${esc(t)}</div><div class="time">${ts()}</div></div>`);scr()}
function addTyping(){$('chat').insertAdjacentHTML('beforeend',`<div class="row bot" id="tp"><div class="bubble"><div class="dots"><span></span><span></span><span></span></div></div></div>`);scr()}
function rmTyping(){const t=$('tp');if(t)t.remove()}
function addErr(m){$('chat').insertAdjacentHTML('beforeend',`<div class="row bot"><div class="err">${m}</div></div>`);scr()}

function addCard(data){
  const er=data.engine_result, dec=er.decisions||[];
  let pill;
  if(!er.days_to_zero)pill='<span class="pill ok">✓ Solvent</span>';
  else if(er.days_to_zero>7)pill=`<span class="pill warn">⚠ ${er.days_to_zero}d left</span>`;
  else pill=`<span class="pill crit">🔥 ${er.days_to_zero}d left</span>`;

  const items=dec.map(d=>`<div class="item ${d.score_band||'LOW'}"><div class="item-info"><div class="item-name">${esc(d.counterparty_name)}</div><div class="item-meta">₹${(d.amount_inr||0).toLocaleString('en-IN')} · Due ${d.due_date||'—'} · CS ${(d.consequence_score||0).toFixed(1)}</div></div><span class="tag ${d.action||'DEFER'}">${d.action||'DEFER'}</span></div>`).join('');
  const foot=er.cash_shortfall_inr>0?`<span class="red">Shortfall ₹${er.cash_shortfall_inr.toLocaleString('en-IN')}</span>`:`<span class="grn">Fully solvent</span>`;

  $('chat').insertAdjacentHTML('beforeend',`<div class="row bot"><div class="card"><div class="card-h"><span>FlowGuard Report</span>${pill}</div><div class="card-b">${items}</div><div class="card-f"><span>Cash ₹${(er.available_cash_inr||0).toLocaleString('en-IN')}</span>${foot}</div></div><div class="time">${ts()}</div></div>`);
  scr();
}

// Route a /pipeline response to the correct UI renderer
function handleReply(data) {
  const intent = data.intent || 'STATUS';

  // INGEST: just show the bot_reply confirmation bubble
  if (intent === 'INGEST') {
    const msg = data.bot_reply || `✅ Recorded ${(data.stored||[]).length} obligation(s).`;
    $('chat').insertAdjacentHTML('beforeend',
      `<div class="row bot"><div class="bubble">${esc(msg)}</div><div class="time">${ts()}</div></div>`);
    scr(); return;
  }

  // FILTER: show bot_reply + JSON table of results
  if (intent === 'FILTER') {
    const msg = data.bot_reply || 'Fetching records…';
    const txns = data.transactions || [];
    const obs  = data.obligations  || [];
    let rows = '';
    txns.forEach(t => {
      rows += `<div class="item MEDIUM"><div class="item-info"><div class="item-name">${esc(t.counterparty||'—')}</div><div class="item-meta">₹${(t.amount_inr||0).toLocaleString('en-IN')} · ${t.direction||''} · ${t.txn_date||''}</div></div><span class="tag NEGOTIATE">${t.medium||''}</span></div>`;
    });
    obs.forEach(o => {
      rows += `<div class="item MEDIUM"><div class="item-info"><div class="item-name">${esc(o.counterparty_name||'—')}</div><div class="item-meta">₹${(o.amount_inr||0).toLocaleString('en-IN')} · Due ${o.due_date||'—'} · ${o.category||''}</div></div><span class="tag DEFER">${o.flexibility||''}</span></div>`;
    });
    const card = rows ? `<div class="card"><div class="card-h"><span>Filter Results</span><span class="pill ok">✓ ${(txns.length+obs.length)} found</span></div><div class="card-b">${rows}</div></div>` : '';
    $('chat').insertAdjacentHTML('beforeend',
      `<div class="row bot"><div class="bubble">${esc(msg)}</div>${card}<div class="time">${ts()}</div></div>`);
    scr(); return;
  }

  // STATUS with no engine_result (e.g. "no obligations found" note)
  if (!data.engine_result) {
    const msg = data.bot_reply || data.note || 'No obligations found. Please ingest data first.';
    $('chat').insertAdjacentHTML('beforeend',
      `<div class="row bot"><div class="bubble">${esc(msg)}</div><div class="time">${ts()}</div></div>`);
    scr(); return;
  }

  // STATUS with full engine_result → decision card
  addCard(data);
}

// File upload endpoint routing
function uploadEndpoint(name){

  const e=name.split('.').pop().toLowerCase();
  if(['csv','xlsx','xls'].includes(e))return'/upload/csv';
  if(e==='pdf')return'/upload/pdf';
  if(['jpg','jpeg','png','webp','bmp','tiff'].includes(e))return'/upload/image';
  return null;
}

// Render file import results
function addFileResult(data){
  if(!data.success && !data.skipped_duplicate){
    addErr('File error: '+(data.error||'Unknown'));return;
  }
  if(data.skipped_duplicate){
    $('chat').insertAdjacentHTML('beforeend',`<div class="row bot"><div class="bubble">📎 This file was already imported. ${data.error||''}</div><div class="time">${ts()}</div></div>`);
    scr();return;
  }
  const n=data.obligations_found, nw=data.obligations_new, up=data.obligations_updated;
  let summary=`📎 Imported <b>${n}</b> obligation${n!==1?'s':''} from <b>${esc(data.filename)}</b>`;
  if(up>0)summary+=` (${nw} new, ${up} updated)`;
  
  let cards='';
  if(data.obligations && data.obligations.length>0){
    const items=data.obligations.map(ob=>`<div class="item ${ob.category==='STATUTORY'?'CRITICAL':ob.category==='SECURED_LOAN'?'HIGH':'MEDIUM'}"><div class="item-info"><div class="item-name">${esc(ob.counterparty_name||'Unknown')}</div><div class="item-meta">₹${(ob.amount_inr||0).toLocaleString('en-IN')} · Due ${ob.due_date||'—'} · ${ob.category||'OTHER'}</div></div><span class="tag ${ob.flexibility==='FIXED'?'PAY':ob.flexibility==='NEGOTIABLE'?'NEGOTIATE':'DEFER'}">${ob.flexibility||'DEFERRABLE'}</span></div>`).join('');
    cards=`<div class="card"><div class="card-h"><span>${esc(data.file_type)} Import</span><span class="pill ok">✓ Done</span></div><div class="card-b">${items}</div><div class="card-f"><span>${n} obligation${n!==1?'s':''}</span><span class="grn">${nw} new</span></div></div>`;
  }
  $('chat').insertAdjacentHTML('beforeend',`<div class="row bot"><div class="bubble">${summary}</div>${cards}<div class="time">${ts()}</div></div>`);
  scr();
}

// Send (text or file)
async function go(){
  if(busy)return;
  const inp=$('inp'), text=inp.value.trim();

  // File upload only (no text)
  if(!text && pFile){
    const w=$('wel');if(w)w.remove();
    const ep=uploadEndpoint(pFile.name);
    if(!ep){
      addErr('Unsupported file type. Use CSV, PDF, or image (JPG/PNG).');
      pFile=null;$('bn').style.display='none';return;
    }
    busy=true;$('sb').disabled=true;
    addTyping();
    const fd=new FormData();fd.append('file',pFile);
    try{
      const r=await fetch(API+ep,{method:'POST',body:fd});
      rmTyping();
      if(!r.ok){const e=await r.json().catch(()=>({}));addErr('Upload error: '+(e.detail||'HTTP '+r.status))}
      else addFileResult(await r.json());
    }catch{rmTyping();addErr('Cannot reach engine. Make sure the server is running.')}
    finally{busy=false;$('sb').disabled=false;pFile=null;$('bn').style.display='none';inp.focus()}
    return;
  }

  // File + text: upload file first, then run pipeline with text
  if(text && pFile){
    const w=$('wel');if(w)w.remove();
    busy=true;$('sb').disabled=true;
    inp.value='';inp.style.height='auto';
    addMe(text);addTyping();
    
    // Upload file silently
    const ep=uploadEndpoint(pFile.name);
    if(ep){
      const fd=new FormData();fd.append('file',pFile);
      try{await fetch(API+ep,{method:'POST',body:fd})}catch{}
    }
    pFile=null;$('bn').style.display='none';
    
    // Run pipeline with text
    try{
      const res=await fetch(API+'/pipeline',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({raw_text:getProfileContext()+text,language:'en'})});
      rmTyping();
      if(!res.ok){const e=await res.json().catch(()=>({}));addErr('Error: '+(e.detail||e.error||'HTTP '+res.status))}
      else handleReply(await res.json());
    }catch{rmTyping();addErr('Cannot reach engine. Make sure the server is running.')}
    finally{busy=false;$('sb').disabled=false;inp.focus()}
    return;
  }

  if(!text)return;

  const w=$('wel');if(w)w.remove();
  busy=true;$('sb').disabled=true;
  inp.value='';inp.style.height='auto';
  if(pFile){pFile=null;$('bn').style.display='none'}

  addMe(text);addTyping();

  try{
    const res=await fetch(API+'/pipeline',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({raw_text:getProfileContext()+text,language:'en'})});
    rmTyping();
    if(!res.ok){const e=await res.json().catch(()=>({}));addErr('Error: '+(e.detail||e.error||'HTTP '+res.status))}
    else handleReply(await res.json());

  }catch{rmTyping();addErr('Cannot reach engine. Make sure the server is running.')}
  finally{busy=false;$('sb').disabled=false;inp.focus()}
}
</script>
